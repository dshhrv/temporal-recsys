data_path: data/tgn_ml1m

interactions_path: interactions.csv
meta_path: meta.json

USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: time_days
EDGE_FEATURE_FIELD: edge_feat_0

model: TGN
loss_type: FullCE

epochs: 10
eval_step: 1
stopping_step: 5

train_batch_size: 16
eval_batch_size: 32
learning_rate: 0.0001
weight_decay: 0.0

memory_dim: 31
embedding_dim: 31
time_dim: 100
edge_dim: 1

num_neighbors: 10
num_attention_heads: 1
dropout: 0.1
use_item_bias: true

eval_args:
  mode: full
  validation_state: train
  test_state: train_valid
  mask_seen_items: true

metrics: [Recall, NDCG, MRR]
topk: [5, 10, 20]
valid_metric: Recall@10

seed: 42
use_gpu: true
show_progress: true

item_chunk_size: 256
output_dir: /kaggle/working/tgn_full_ce_results
checkpoint_dir: /kaggle/working/tgn_full_ce_results/checkpoints
checkpoint_prefix: tgn_full_ce
best_checkpoint_name: tgn_full_ce_best.pt
last_checkpoint_name: tgn_full_ce_last.pt
epoch_metrics_name: tgn_full_ce_epoch_metrics.csv
test_metrics_name: tgn_full_ce_test_metrics.csv
resume_checkpoint_path: ~
