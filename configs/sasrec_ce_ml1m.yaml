data_path: data
dataset_save_path: ~

USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: timestamp

load_col:
  inter: [user_id, item_id, timestamp]

model: SASRec
loss_type: CE

epochs: 1
train_batch_size: 256
eval_batch_size: 256
learning_rate: 0.001
embedding_size: 64
hidden_size: 64
inner_size: 256
n_layers: 2
n_heads: 2
dropout_prob: 0.2
max_seq_length: 50

train_neg_sample_args: ~
eval_args:
  group_by: none
  order: TO
  split:
    RS: [0.8, 0.1, 0.1]
  mode: full

metrics: [Recall, NDCG, MRR]
topk: [5, 10, 20]
valid_metric: NDCG@10
seed: 42
reproducibility: true
use_gpu: false
show_progress: true
